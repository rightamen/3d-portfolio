name: C++ App Skeleton

on:
  push:
    branches:
      - main
      - "feat/**"
      - "ci/**"
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S cpp-app -B cpp-app/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build cpp-app/build --config Debug

      - name: Smoke test
        run: ctest --test-dir cpp-app/build --build-config Debug --output-on-failure
