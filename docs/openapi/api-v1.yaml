      summary: Delete one of the signed-in visitor's own community uploads.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok: { type: boolean, enum: [true] }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "404":
          description: Upload not found (or not owned by this visitor).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
