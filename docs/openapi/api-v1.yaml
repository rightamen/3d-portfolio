      x-cpp-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok: { type: boolean, enum: [true] }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "404":
          description: Post not found (or not owned by this visitor).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /community/uploads:
    get:
      operationId: listCommunityUploads
      tags: [Community]
      summary: List publicly approved community uploads.
      x-cpp-sdk: true
      responses:
        "200":
          description: |
            OK. Returns `{ uploads: [] }` when the community store is not
            configured, never an error. Not yet paginated (docs/API_V1_GAPS.md).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          uploads:
                            type: array
                            items: { $ref: "#/components/schemas/CommunityUpload" }
    post:
      operationId: uploadCommunityResource
      tags: [Community]
      summary: Upload a community resource (image or 3D model file).
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title, description]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Image or model extension only (see imageExtensions/modelExtensions), max 120 MiB."
                title: { type: string, maxLength: 160 }
                description: { type: string, maxLength: 1200 }
                assetCategory: { $ref: "#/components/schemas/AssetCategory" }
      responses:
        "201":
          description: Upload created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          upload: { $ref: "#/components/schemas/CommunityUpload" }
        "400":
          description: Missing file/title/description, or INVALID_FILE_TYPE.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "413":
          description: File exceeds the 120 MiB shared upload limit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /community/posts:
    get:
      operationId: listCommunityPosts
      tags: [Community]
      summary: List community posts.
      x-cpp-sdk: true
      responses:
        "200":
          description: |
            OK. Returns `{ posts: [] }` when the community store is not
            configured. Not yet paginated (docs/API_V1_GAPS.md).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          posts:
                            type: array
                            items: { $ref: "#/components/schemas/CommunityPost" }
    post:
      operationId: createCommunityPost
      tags: [Community]
      summary: Create a community post.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, message]
              properties:
                title: { type: string, maxLength: 160 }
                message: { type: string, maxLength: 1800 }
                topic: { $ref: "#/components/schemas/CommunityTopic" }
      responses:
        "201":
          description: Post created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          post: { $ref: "#/components/schemas/CommunityPost" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthRequired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /community/posts/{id}:
    get:
      operationId: getCommunityPost
      tags: [Community]
      summary: Get one community post by id.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          post: { $ref: "#/components/schemas/CommunityPost" }
        "404":
          description: Post not found (or community store not configured).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: COMMUNITY_POST_NOT_FOUND, message: "Community post not found." }

  /community/posts/{id}/comments:
    get:
      operationId: listCommunityComments
      tags: [Community]
      summary: List comments on a community post.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, top]
            default: newest
      responses:
        "200":
          description: |
            OK. Returns `{ comments: [] }` when the community store is not
            configured (never errors in that case).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comments:
                            type: array
                            items: { $ref: "#/components/schemas/CommunityComment" }
        "404":
          description: Post not found (only when the community store IS configured but the post id does not exist).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    post:
      operationId: createCommunityComment
      tags: [Community]
      summary: Add a comment (optionally a reply) to a community post.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, maxLength: 1800 }
                parentId:
                  type: string
                  nullable: true
                  description: Id of the parent comment when replying.
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comment: { $ref: "#/components/schemas/CommunityComment" }
        "400":
          description: Missing message, or parentId does not resolve to an existing comment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "404":
          description: Post not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /community/comments/{id}/like:
    post:
      operationId: toggleCommunityCommentLike
      tags: [Community]
      summary: Toggle the signed-in visitor's like on a community comment.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: |
            Like toggled. `data` shape is the store's raw toggle result
            (liked/likeCount fields) — see docs/API_V1_GAPS.md for exact
            field enumeration pending a DB-backed sample.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResponseEnvelope" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "404":
          description: Comment not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /community/comments/{id}:
    delete:
      operationId: deleteCommunityComment
      tags: [Community]
      summary: Delete the signed-in visitor's own community comment.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok: { type: boolean, enum: [true] }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "404":
          description: Comment not found (or not owned by this visitor).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /users/{handle}:
    get:
      operationId: getPublicUserProfile
      tags: [Users]
      summary: Get a visitor's public profile by handle.
      description: |
        Deliberately returns `RESOURCE_FORBIDDEN` + 404 for every
        "cannot show this handle" case (missing store, invalid handle
        format, non-existent profile) to prevent handle enumeration — see
        server/index.js comment above this route.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: |
            OK. If the profile exists but `profilePublic` is false, `data`
            contains only `{ handle, profilePublic: false }` — no other
            fields are present in that case.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profile: { $ref: "#/components/schemas/PublicProfile" }
        "403":
          description: Profile disabled by an administrator.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: PROFILE_ADMIN_DISABLED, message: "This public profile is currently unavailable." }
        "404":
          description: Profile not found, invalid handle, or anti-enumeration response for a private/nonexistent handle.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: RESOURCE_FORBIDDEN, message: "User profile not found." }

  /users/{handle}/resources:
    get:
      operationId: getPublicUserResources
      tags: [Users]
      summary: List a visitor's public community uploads.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: |
            OK. Returns `{ resources: [] }` for private/disabled profiles,
            missing stores, or invalid activityPublic/profilePublic state —
            never an error in those cases.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          resources:
                            type: array
                            items: { $ref: "#/components/schemas/PublicUpload" }
        "403":
          description: Profile disabled by an administrator.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Invalid handle or profile not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /users/{handle}/posts:
    get:
      operationId: getPublicUserPosts
      tags: [Users]
      summary: List a visitor's public community posts.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: "OK. Returns `{ posts: [] }` for private/disabled profiles or missing stores."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          posts:
                            type: array
                            items: { $ref: "#/components/schemas/PublicPost" }
        "403":
          description: Profile disabled by an administrator.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Invalid handle or profile not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /users/{handle}/activity:
    get:
      operationId: getPublicUserActivity
      tags: [Users]
      summary: Combined feed of a visitor's public comments, posts, and resources.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: |
            OK. Returns `{ comments: [], posts: [], resources: [] }` for
            private/disabled profiles or missing stores.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comments:
                            type: array
                            items: { $ref: "#/components/schemas/PublicComment" }
                          posts:
                            type: array
                            items: { $ref: "#/components/schemas/PublicPost" }
                          resources:
                            type: array
                            items: { $ref: "#/components/schemas/PublicUpload" }
        "403":
          description: Profile disabled by an administrator.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Invalid handle or profile not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /contact:
    post:
      operationId: sendContactMessage
      tags: [Contact]
      summary: Submit a public contact form message.
      x-cpp-sdk: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, message]
              properties:
                name: { type: string, maxLength: 120 }
                email: { type: string, format: email, maxLength: 180 }
                message: { type: string, maxLength: 2000 }
      responses:
        "201":
          description: Message recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok: { type: boolean, enum: [true] }
        "400":
          $ref: "#/components/responses/ValidationError"

  # --- Admin (Web-only). Mechanically reachable under /api/v1/admin/* via the
  # dual mount; NOT part of the C++ SDK public surface. Every operation below
  # is tagged x-cpp-sdk: false. Only a representative subset is documented in
  # full detail (the rest follow the identical requireAdmin + strict-envelope
  # pattern); see docs/API_V1_GAPS.md for the complete admin route inventory
  # and docs/API_CONTRACT.md for the legacy /api/admin/* behavior.
  /admin/summary:
    get:
      operationId: getAdminSummary
      tags: [Admin (Web-only)]
      summary: Aggregate counts for the admin dashboard. Web-only.
      x-cpp-sdk: false
      security:
        - adminToken: []
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          summary:
                            type: object
                            description: |
                              Counts object (comments/likes/download_requests/
                              pending_downloads/contact_messages/visitors/
                              community_posts/community_comments/
                              community_uploads/pending_community_uploads).
                              See server/postgresStores.js getSummary.
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /admin/visitors:
    get:
      operationId: listAdminVisitors
      tags: [Admin (Web-only)]
      summary: Paginated visitor search. Web-only, real sendPage pagination.
      x-cpp-sdk: false
      security:
        - adminToken: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: query
          in: query
          schema: { type: string }
        - name: verified
          in: query
          schema: { type: string, enum: [true, false] }
        - name: accessLevel
          in: query
          schema: { $ref: "#/components/schemas/AccessLevel" }
        - name: profileStatus
          in: query
          schema: { type: string, enum: [public, private, disabled] }
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, lastLoginAt, displayName]
            default: createdAt
      responses:
        "200":
          description: OK, with real six-field pagination.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          visitors:
                            type: array
                            items: { $ref: "#/components/schemas/AdminVisitor" }
                      pagination: { $ref: "#/components/schemas/Pagination" }
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /admin/visitors/{id}:
    get:
      operationId: getAdminVisitor
      tags: [Admin (Web-only)]
      summary: Get one visitor's detail + recent moderation actions. Web-only.
      x-cpp-sdk: false
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          visitor: { $ref: "#/components/schemas/AdminVisitor" }
                          recentActions:
                            type: array
                            items: { $ref: "#/components/schemas/AdminVisitorAction" }
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "404":
          description: Visitor not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: VISITOR_NOT_FOUND, message: "Visitor not found." }

  /admin/visitors/{id}/profile-visibility:
    patch:
      operationId: setAdminVisitorProfileVisibility
      tags: [Admin (Web-only)]
      summary: Enable/disable a visitor's public profile. Web-only.
      x-cpp-sdk: false
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [disabled]
              properties:
                disabled: { type: boolean }
                reason: { type: string, maxLength: 500 }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          visitor: { $ref: "#/components/schemas/AdminVisitor" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "404":
          description: Visitor not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Visitor session token (opaque random string; server stores only its
        hash). Part of the C++ SDK public contract — see
        API_V1_FREEZE_PLAN.md §9. Token lifetime/refresh semantics are NOT
        yet frozen (checklist #5, still open).
    adminToken:
      type: http
      scheme: bearer
      description: |
        Static ADMIN_TOKEN Bearer credential, Web-only. NOT part of the C++
        SDK public contract — the SDK must never implement or store this
        credential. See API_V1_FREEZE_PLAN.md §9/§3.

  parameters:
    ProjectSlug:
      name: slug
      in: path
      required: true
      schema: { type: string }
    ResourceId:
      name: id
      in: path
      required: true
      schema: { type: string }
    Handle:
      name: handle
      in: path
      required: true
      schema: { type: string }

  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            data: null
            pagination: {}
            error: { code: VALIDATION_ERROR, message: "Please provide valid input." }
    AuthRequired:
      description: Visitor authentication required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            data: null
            pagination: {}
            error: { code: AUTH_REQUIRED, message: "Please sign in to continue." }
    AdminAuthRequired:
      description: Admin authentication required. Web-only; the C++ SDK should never encounter this.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            data: null
            pagination: {}
            error: { code: ADMIN_AUTH_REQUIRED, message: "Admin authorization is required." }
    ServiceUnavailable:
      description: A required backend store is not configured.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            data: null
            pagination: {}
            error: { code: SERVICE_UNAVAILABLE, message: "Service is not configured." }

  schemas:
    ResponseEnvelope:
      type: object
      description: |
