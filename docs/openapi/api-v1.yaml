openapi: 3.0.3
info:
  title: mrright.blog API v1
  version: "1.0.0"
  description: |
    Strict-envelope contract for `/api/v1/*`, frozen for the future C++
    cross-platform App (see `docs/API_V1_FREEZE_PLAN.md` and
    `docs/CPP_APP_MIGRATION_PLAN.md`).

    Scope and provenance:
    - This spec documents ONLY endpoints that exist in `server/index.js` today
      and are covered by `tests/api/contract.spec.js` and/or
      `tests/api/contract.db.spec.js`. No field below is invented; every
      response schema is derived from the actual `sendData`/`sendPage`
      handler payloads and, where DB-backed, from `server/postgresStores.js`
      row mappers.
    - `/api/v1/*` and legacy `/api/*` share the exact same route handlers via
      a URL-rewrite dual mount (`server/index.js`). The ONLY behavioral
      difference is the response envelope shape (see below). This spec
      documents the `/api/v1` strict shape; the legacy `/api/*` mirror
      behavior is documented in `docs/API_CONTRACT.md`.
    - Fields/endpoints that exist but whose shape is not yet fully sample-
      verified are flagged inline with `x-gap` and cross-referenced in
      `docs/API_V1_GAPS.md`. Nothing in `docs/API_V1_GAPS.md` is guessed at
      here — gaps are omitted or marked, never fabricated.

    Response envelope (strict, `/api/v1/*` only):
    - Top-level keys are ALWAYS exactly `data`, `pagination`, `error` — no
      more, no fewer. Enforced by `server/contracts/responseValidator.js`
      with `allowCompatibilityKeys=false, allowLegacyKeys=false`, and by the
      reverse-mirror contract tests in `tests/api/contract.spec.js`.
    - Success: `error` is `null`, `data` is an object (never a bare array),
      `pagination` is `{}` unless the endpoint paginates.
    - Failure: `data` is `null`, `error` is `{ code, message }`, `pagination`
      is still an object (`{}` unless the endpoint paginates).

    C++ SDK consumption rule: the C++ App consumes `/api/v1/*` ONLY. Legacy
    `/api/*` (with its top-level data/code/message mirrors) exists solely for
    the current Web front end and MUST NOT be used by the SDK. Endpoints
    tagged `Admin (Web-only)` are mechanically reachable under `/api/v1/admin/*`
    (the dual mount covers them) but are NOT part of the C++ SDK public
    surface — see `x-cpp-sdk: false` on each admin operation.
  contact:
    name: mrright.blog
    url: https://mrright.blog
servers:
  - url: https://mrright.blog/api/v1
    description: Production (strict v1 envelope)
  - url: http://localhost:4173/api/v1
    description: Local dev server (strict v1 envelope)

tags:
  - name: Health
  - name: Auth
    description: Visitor account authentication. Public-surface, part of the C++ SDK contract.
  - name: Projects
    description: Public portfolio project catalog and per-project interactions.
  - name: Account
    description: Signed-in visitor's own profile/content. Requires bearer visitor token.
  - name: Profile Upload
    description: Avatar/banner multipart uploads for the signed-in visitor.
  - name: Community
    description: Public community posts/uploads and authenticated write actions.
  - name: Users
    description: Public profile pages by handle.
  - name: Downloads
    description: Project download request submission and status.
  - name: Contact
    description: Public contact form.
  - name: Admin (Web-only)
    description: |
      Mechanically reachable at `/api/v1/admin/*` via the dual mount, and
      returns the strict envelope like every other v1 route. NOT part of the
      C++ SDK public surface: authenticated by a static Web-only ADMIN_TOKEN,
      not the visitor bearer token, and not intended for native client
      consumption. See docs/API_V1_FREEZE_PLAN.md §3/§9.

security: []

paths:
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Liveness/service identity check.
      x-cpp-sdk: true
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
              example:
                data: { ok: true, service: mrright-portfolio }
                pagination: {}
                error: null

  /auth/me:
    get:
      operationId: getCurrentVisitor
      tags: [Auth]
      summary: Get the current visitor from the bearer token, or null if unauthenticated.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      responses:
        "200":
          description: |
            Always 200. `data.user` is `null` when no token is supplied or the
            token does not resolve to a session.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            oneOf:
                              - $ref: "#/components/schemas/User"
                              - type: "null"

  /auth/register:
    post:
      operationId: registerVisitor
      tags: [Auth]
      summary: Register a new visitor account and send an email verification code.
      x-cpp-sdk: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName, email, password]
              properties:
                displayName: { type: string, maxLength: 80 }
                email: { type: string, format: email, maxLength: 180 }
                password: { type: string, minLength: 8 }
      responses:
        "201":
          description: Account created; verification email queued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: "#/components/schemas/User" }
                          verification:
                            type: object
                            description: |
                              `devCode` is only present when NODE_ENV !==
                              'production' (dev/test convenience so the flow
                              can be completed without SMTP). Never rely on it
                              in production clients.
                            properties:
                              delivery: { type: string }
                              expiresAt: { type: string, format: date-time }
                              required: { type: boolean }
                              devCode: { type: string, description: "dev/test only" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: EMAIL_ALREADY_REGISTERED, message: "This email is already registered." }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /auth/resend-verification:
    post:
      operationId: resendVisitorVerification
      tags: [Auth]
      summary: Resend the email verification code for an unverified account.
      x-cpp-sdk: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Verification code resent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          verification:
                            type: object
                            properties:
                              delivery: { type: string }
                              expiresAt: { type: string, format: date-time }
                              required: { type: boolean }
                              devCode: { type: string, description: "dev/test only" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Email not registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Email already verified.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /auth/login:
    post:
      operationId: loginVisitor
      tags: [Auth]
      summary: Sign in with email + password and receive a bearer session token.
      x-cpp-sdk: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Signed in.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          session: { $ref: "#/components/schemas/Session" }
                          user: { $ref: "#/components/schemas/AccountProfile" }
        "401":
          description: Incorrect email or password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: VALIDATION_ERROR, message: "Email or password is incorrect." }
        "403":
          description: Email not verified yet.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: EMAIL_NOT_VERIFIED, message: "Please verify your email before signing in." }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /auth/verify-email:
    post:
      operationId: verifyVisitorEmail
      tags: [Auth]
      summary: Confirm an email verification code and receive a bearer session token.
      x-cpp-sdk: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string, maxLength: 12 }
      responses:
        "200":
          description: Email verified; session created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          session: { $ref: "#/components/schemas/Session" }
                          user: { $ref: "#/components/schemas/User" }
        "400":
          description: Missing fields, or code invalid/expired.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /auth/logout:
    post:
      operationId: logoutVisitor
      tags: [Auth]
      summary: Revoke the current bearer session token, if any.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Always 200, whether or not a session was revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok: { type: boolean, enum: [true] }

  /profile:
    get:
      operationId: getSiteProfile
      tags: [Health]
      summary: Static site owner profile + skills (portfolio content, not a visitor account).
      x-cpp-sdk: true
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profile:
                            type: object
                            description: |
                              Static content object from server/content.js
                              (name, handle, domain, intro/about text in
                              zh/en/ja, highlights, socials). Field set is
                              stable but not yet enumerated field-by-field in
                              this spec — see docs/API_V1_GAPS.md.
                          skills:
                            type: array
                            items: {}

  /experience:
    get:
      operationId: getExperience
      tags: [Health]
      summary: Static work-experience timeline content.
      x-cpp-sdk: true
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          experience:
                            type: array
                            items: {}
                            description: "Static content array; see docs/API_V1_GAPS.md."

  /projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: List public portfolio projects.
      x-cpp-sdk: true
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          projects:
                            type: array
                            items: { $ref: "#/components/schemas/Project" }
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /projects/{slug}:
    get:
      operationId: getProject
      tags: [Projects]
      summary: Get one project by slug.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          project: { $ref: "#/components/schemas/Project" }
        "404":
          description: Project not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: PROJECT_NOT_FOUND, message: "Project not found." }

  /projects/{slug}/interactions:
    get:
      operationId: getProjectInteractions
      tags: [Projects]
      summary: Get a project's public comments and like count.
      x-cpp-sdk: true
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comments:
                            type: array
                            items: { $ref: "#/components/schemas/ProjectComment" }
                          likeCount: { type: integer }
        "404":
          description: Project not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /projects/{slug}/like:
    post:
      operationId: toggleProjectLike
      tags: [Projects]
      summary: Toggle a visitor's like on a project. Public write (no auth required); visitorId is a client-generated identifier.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId]
              properties:
                visitorId:
                  type: string
                  description: Client-generated anonymous visitor identifier (not the account id).
      responses:
        "200":
          description: Like toggled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          liked: { type: boolean }
                          likeCount: { type: integer }
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Project not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /projects/{slug}/comments:
    post:
      operationId: addProjectComment
      tags: [Projects]
      summary: Add a public comment to a project. Works signed-in or as a guest (author name supplied in body).
      x-cpp-sdk: true
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                author:
                  type: string
                  description: Required if not signed in; ignored/overridden by the visitor's displayName when a bearer token resolves.
                message: { type: string, maxLength: 1000 }
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comment: { $ref: "#/components/schemas/ProjectComment" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Project not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /projects/{slug}/download-requests:
    post:
      operationId: requestProjectDownload
      tags: [Downloads]
      summary: Submit a download request for a project's protected asset.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, purpose]
              properties:
                name: { type: string, maxLength: 120 }
                email: { type: string, format: email, maxLength: 180 }
                purpose: { type: string, maxLength: 1200 }
      responses:
        "201":
          description: Request recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok: { type: boolean, enum: [true] }
                          request:
                            type: object
                            properties:
                              id: { type: string }
                              status: { $ref: "#/components/schemas/DownloadRequestStatus" }
                              createdAt: { type: string, format: date-time }
                          access:
                            type: object
                            description: |
                              Server-computed authorization decision. The
                              client must branch only on `allowed` — it must
                              not re-derive downloadPolicy rules locally (see
                              API_V1_FREEZE_PLAN.md §10).
                            properties:
                              allowed: { type: boolean }
                              current: { $ref: "#/components/schemas/AccessLevel" }
                              required: { $ref: "#/components/schemas/AccessLevel" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Project not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /account/profile:
    get:
      operationId: getAccountProfile
      tags: [Account]
      summary: Get the signed-in visitor's own account profile.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profile: { $ref: "#/components/schemas/AccountProfile" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    put:
      operationId: updateAccountProfile
      tags: [Account]
      summary: Update the signed-in visitor's account profile.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName, handle]
              properties:
                displayName: { type: string, minLength: 2, maxLength: 40 }
                handle:
                  type: string
                  description: "3-30 lowercase letters, numbers, hyphens, underscores."
                bio: { type: string, maxLength: 300 }
                location: { type: string, maxLength: 120 }
                website: { type: string, format: uri, maxLength: 300 }
                publicEmail: { type: string, format: email, maxLength: 180 }
                profilePublic: { type: boolean }
                activityPublic: { type: boolean }
                contactsPublic: { type: boolean }
                contactLinks:
                  type: object
                  description: |
                    Keyed by wechat/telegram/twitter/github/bilibili/youtube/
                    artstation; each value is `{ public, url, value }`. See
                    server/index.js normalizeContactLinks.
      responses:
        "200":
          description: Profile updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profile: { $ref: "#/components/schemas/AccountProfile" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthRequired"
        "409":
          description: Handle already taken.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: HANDLE_TAKEN, message: "This handle is already taken." }

  /account/avatar:
    post:
      operationId: uploadAccountAvatar
      tags: [Profile Upload]
      summary: Upload/replace the signed-in visitor's avatar image.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "JPG/PNG/WebP only, max 2 MiB (avatarUploadLimit)."
      responses:
        "201":
          description: Avatar updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          avatarUrl: { type: string }
                          profile: { $ref: "#/components/schemas/AccountProfile" }
        "400":
          description: |
            Missing file (VALIDATION_ERROR) or unsupported file type
            (INVALID_FILE_TYPE — see docs/PROJECT_PROGRESS.md 2026-07-04 fix).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "413":
          description: File exceeds the 2 MiB avatar limit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example:
                data: null
                pagination: {}
                error: { code: FILE_TOO_LARGE, message: "File too large" }

  /account/banner:
    post:
      operationId: uploadAccountBanner
      tags: [Profile Upload]
      summary: Upload/replace the signed-in visitor's profile banner image.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "JPG/PNG/WebP only, max 5 MiB (bannerUploadLimit)."
      responses:
        "201":
          description: Banner updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          bannerUrl: { type: string }
                          profile: { $ref: "#/components/schemas/AccountProfile" }
        "400":
          description: Missing file or unsupported file type (INVALID_FILE_TYPE).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "413":
          description: File exceeds the 5 MiB banner limit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /account/community:
    get:
      operationId: getAccountCommunity
      tags: [Account]
      summary: List the signed-in visitor's own community posts and uploads.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          posts:
                            type: array
                            items: { $ref: "#/components/schemas/CommunityPost" }
                          uploads:
                            type: array
                            items: { $ref: "#/components/schemas/CommunityUpload" }
        "401":
          $ref: "#/components/responses/AuthRequired"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /account/downloads:
    get:
      operationId: getAccountDownloads
      tags: [Account]
      summary: List the signed-in visitor's own download requests.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      responses:
        "200":
          description: |
            OK. Not yet paginated (see API_V1_FREEZE_PLAN.md §8 backlog /
            docs/API_V1_GAPS.md) — returns the full list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          requests:
                            type: array
                            items: { $ref: "#/components/schemas/DownloadRequest" }
        "401":
          $ref: "#/components/responses/AuthRequired"

  /account/comments:
    get:
      operationId: getAccountComments
      tags: [Account]
      summary: List the signed-in visitor's own project comments and total like count given.
      x-cpp-sdk: true
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK. Not yet paginated (see docs/API_V1_GAPS.md)."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comments:
                            type: array
                            items:
                              type: object
                              description: |
                                Row shape not yet fully enumerated for the
                                account-scoped listing — see
                                docs/API_V1_GAPS.md.
                          likeCount: { type: integer }
        "401":
          $ref: "#/components/responses/AuthRequired"

  /account/community/uploads/{id}:
    delete:
      operationId: deleteAccountCommunityUpload
